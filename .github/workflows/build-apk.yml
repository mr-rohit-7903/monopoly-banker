name: Build Android APK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-apk:
    name: Build APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: artifacts/monopoly-banker

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: .

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Build APK
        run: eas build --platform android --profile preview --non-interactive --local

      - name: Extract and Rename APKs
        run: |
          # If EAS packed multiple APKs into a tarball, extract it
          if ls build-*.tar.gz 1> /dev/null 2>&1; then
            tar -xzf build-*.tar.gz
            rm build-*.tar.gz
          fi
          
          # Rename any generated APKs to have clean, readable names
          for file in *.apk **/*.apk; do
            if [[ -f "$file" ]]; then
              for arch in arm64-v8a armeabi-v7a x86_64 x86 universal; do
                if [[ "$file" == *"$arch"* ]]; then
                  mv "$file" "monopoly-banker-$arch.apk"
                  break
                fi
              done
            fi
          done
        working-directory: artifacts/monopoly-banker
        
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: monopoly-banker-apk
          path: artifacts/monopoly-banker/monopoly-banker-*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: artifacts/monopoly-banker/monopoly-banker-*.apk
          body: |
            ### Monopoly Banker Release 
            
            We now provide smaller, optimized APKs for different Android devices instead of one large file!
            
            **Which one should I download?**
            *   **`arm64-v8a`** *(Recommended)*  For 99% of modern Android phones.
            *   **`armeabi-v7a`**  For older, 32-bit Android phones.
            *   **`x86_64`**  For modern Android Emulators.
            *   **`x86`**  For older Android Emulators.
