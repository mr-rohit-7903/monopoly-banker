kind = "mobile"
previewPath = "/"
title = "Monopoly Banker"
version = "1.0.0"
id = "artifacts/monopoly-banker"
router = "expo-domain"

[[services]]
name = "expo"
ensurePreviewReachable = "/status"
paths = [ "/" ]
localPort = 21461

[services.development]
run = "pnpm --filter @workspace/monopoly-banker run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/monopoly-banker", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/monopoly-banker", "run", "serve" ]

[services.env]
PORT = "21461"
BASE_PATH = "/"
